<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Lite Mobile</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; text-align: center; padding: 15px; }
        .app-container { background: #161616; border-radius: 24px; padding: 20px; border: 1px solid #222; max-width: 400px; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2 { color: #00ff00; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00ff00; }

        .nav { display: flex; gap: 8px; margin: 20px 0; background: #222; padding: 5px; border-radius: 14px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; background: none; color: #666; font-weight: bold; cursor: pointer; }
        .nav-btn.active { background: #00ff00; color: black; }

        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 12px; }
        .btn-u { background: #00ff00; color: black; }
        .btn-p { background: #0088ff; color: white; }

        #log { 
            margin-top: 25px; padding: 15px; border-radius: 14px; background: #000; 
            font-family: monospace; font-size: 11px; text-align: left; 
            min-height: 140px; border: 1px solid #222; overflow-y: auto;
        }
        .log-success { color: #00ff00; } 
        .log-error { color: #ffff00; }   
        .log-fail { color: #ff4444; }    
    </style>
</head>
<body>
    <div class="app-container">
        <h2>STUDIO LITE</h2>
        
        <input type="password" id="apiKey" placeholder="Paste Your New API Key">

        <div class="nav">
            <button class="nav-btn active" id="btnU" onclick="showTab('u')">Universe</button>
            <button class="nav-btn" id="btnP" onclick="showTab('p')">Place</button>
        </div>

        <div id="sec-u">
            <input type="text" id="expName" placeholder="Experience Name">
            <button class="main-btn btn-u" onclick="createUniverse()">GENERATE EXPERIENCE</button>
        </div>

        <div id="sec-p" style="display:none;">
            <input type="text" id="uniId" placeholder="Paste Universe ID">
            <button class="main-btn btn-p" onclick="addPlace()">ADD START PLACE</button>
        </div>

        <div id="log">
            <div style="color:#444;">> Waiting for API Key...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
